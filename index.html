<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360 PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        #main-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Адаптив под MacBook и iPhone 13 Pro */
        @media (min-width: 1024px) {
            #main-container { flex-direction: row; }
            #map { width: 30% !important; height: 100% !important; border-right: 1px solid #222; }
            #panorama-container { width: 70% !important; height: 100% !important; }
        }
        @media (max-width: 1023px) {
            #main-container { flex-direction: column-reverse; }
            #map { width: 100%; height: 30%; border-top: 1px solid #333; transition: height 0.4s ease; }
            #panorama-container { width: 100%; height: 70%; position: relative; transition: height 0.4s ease; }
            .map-full #map { height: 80%; }
            .map-full #panorama-container { height: 20%; }
            .pano-full #map { height: 15%; }
            .pano-full #panorama-container { height: 85%; }
        }

        #panorama { width: 100%; height: 100%; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        /* UI Элементы */
        .ui-controls { position: absolute; top: 15px; left: 15px; z-index: 2000; }
        .btn-ui { background: rgba(30,30,30,0.8); color: white; border: 1px solid #444; padding: 12px 18px; border-radius: 12px; font-weight: 600; backdrop-filter: blur(10px); cursor: pointer; }
        
        #top-info { position: absolute; top: 15px; right: 15px; z-index: 2000; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 12px; text-align: right; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        #top-info h2 { margin: 0; font-size: 18px; color: var(--accent); }
        
        .nav-arrows { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; gap: 50px; }
        .arrow-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); width: 55px; height: 55px; border-radius: 50%; font-size: 28px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }

        /* Маркеры */
        .marker-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .marker-icon { width: 34px; height: 34px; background: rgba(0,122,255,0.15); border: 2px solid var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .marker-label { background: rgba(0,0,0,0.75); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }

        /* Animation */
        @keyframes panoZoom { 0% { opacity: 0.8; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        .pano-anim { animation: panoZoom 0.7s cubic-bezier(0.16, 1, 0.3, 1); }

        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 16px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapClick()"></div>
    <div id="panorama-container" onclick="handlePanoClick()">
        <div id="panorama"></div>
        <div id="top-info" style="display:none"><h2 id="display-title"></h2><p id="display-desc" style="margin:3px 0 0; font-size:12px; color:#ccc;"></p></div>
        <div class="ui-controls"><button class="btn-ui" onclick="event.stopPropagation(); openAdmin()">+ Добавить</button></div>
        <div class="nav-arrows">
            <button class="arrow-btn" onclick="event.stopPropagation(); navigatePano(-1)">‹</button>
            <button class="arrow-btn" onclick="event.stopPropagation(); navigatePano(1)">›</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="margin-top:0">Новая точка</h2>
    <input type="text" id="in-name" placeholder="Название">
    <input type="text" id="in-url" placeholder="Ссылка на фото (Supabase)">
    <input type="text" id="in-desc" placeholder="Описание">
    <select id="in-time" style="background:#1a1a1a; color:white; padding:16px; border-radius:12px; border:1px solid #333; margin-bottom:20px; width:100%;">
        <option value="day">☀️ День</option>
        <option value="sunset">🌅 Закат</option>
        <option value="sunrise">🌄 Рассвет</option>
    </select>
    <button class="btn-ui" style="background:var(--accent); border:none; width:100%; padding:20px;" onclick="savePoint()">ОПУБЛИКОВАТЬ</button>
    <button class="btn-ui" style="background:none; border:none; width:100%; margin-top:10px; color:#555;" onclick="closeAdmin()">ОТМЕНА</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    let map, viewer, clickCoords = null;
    let currentIndex = 0;

    // --- СЮДА ВНОСИ СВОИ ТОЧКИ ИЗ SUPABASE НАВСЕГДА ---
    const SUNSET_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzEyOTA3NCwiZXhwIjoxODA4NjY1MDc0fQ.8pY65AdSogP0twllPXJ_30lWR7KcPP9zV6IAqKQz79Q";
    
    let defaultPoints = [
        {id: 'main', name: 'Thong Sala Sunset', desc: 'Port Area', coords: {lat: 9.7107, lng: 99.9813}, img: SUNSET_IMG, time: 'sunset'}
        // Добавляй новые объекты сюда прямо в коде, чтобы они не пропадали
    ];

    let customPoints = JSON.parse(localStorage.getItem('ph_v18') || '[]');
    let allPoints = [...defaultPoints, ...customPoints];

    function getIconSVG(time) {
        const svgArr = {
            day: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2m0 18v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M1 12h2m18 0h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>',
            sunset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 18a5 5 0 1 0-10 0M12 2v7M4.2 10.2l1.4 1.4M1 18h2m18 0h2M18.4 11.6l1.4-1.4M23 22H1M8 6l4-4 4 4"/></svg>',
            sunrise: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 18a5 5 0 1 0-10 0M12 9V2M4.2 10.2l1.4 1.4M1 18h2m18 0h2M18.4 11.6l1.4-1.4M23 22H1M8 18l4 4 4-4"/></svg>'
        };
        return svgArr[time] || svgArr.day;
    }

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        loadPano(allPoints[0]);
        allPoints.forEach((p, idx) => drawMarker(p, idx));
        map.on('click', e => { clickCoords = e.latlng; });
    }

    function drawMarker(p, index) {
        const icon = L.divIcon({
            className: 'marker-wrapper',
            html: `<div class="marker-icon" style="color:var(--accent)">${getIconSVG(p.time)}</div><div class="marker-label">${p.name}</div>`,
            iconSize: [50, 50], iconAnchor: [25, 50]
        });
        const m = L.marker(p.coords, {icon, draggable: p.id !== 'main'}).addTo(map);
        m.on('dragend', e => {
            const pos = e.target.getLatLng();
            const cIdx = customPoints.findIndex(item => item.id === p.id);
            if (cIdx > -1) { customPoints[cIdx].coords = pos; localStorage.setItem('ph_v18', JSON.stringify(customPoints)); }
        });
        m.on('click', e => { L.DomEvent.stopPropagation(e); currentIndex = index; loadPano(p); if (window.innerWidth < 1024) handlePanoClick(); });
    }

    function loadPano(p) {
        if (viewer) viewer.destroy();
        const el = document.getElementById('panorama');
        el.classList.remove('pano-anim'); void el.offsetWidth; el.classList.add('pano-anim');
        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.img, "autoLoad": true, "showZoomCtrl": false });
        document.getElementById('top-info').style.display = 'block';
        document.getElementById('display-title').innerText = p.name;
        document.getElementById('display-desc').innerText = p.desc || "";
    }

    function navigatePano(dir) {
        currentIndex = (currentIndex + dir + allPoints.length) % allPoints.length;
        loadPano(allPoints[currentIndex]);
    }

    function handleMapClick() { if (window.innerWidth < 1024) { document.body.className = 'map-full'; setTimeout(() => map.invalidateSize(), 400); } }
    function handlePanoClick() { if (window.innerWidth < 1024) { document.body.className = 'pano-full'; setTimeout(() => map.invalidateSize(), 400); } }
    function openAdmin() { if(!clickCoords) return alert("Ткни в карту!"); document.getElementById('admin-panel').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function savePoint() {
        const name = document.getElementById('in-name').value;
        const url = document.getElementById('in-url').value;
        if(!name || !url) return alert("Заполни поля!");
        customPoints.push({ id: Date.now(), name, desc: document.getElementById('in-desc').value, coords: clickCoords, img: url, time: document.getElementById('in-time').value });
        localStorage.setItem('ph_v18', JSON.stringify(customPoints));
        location.reload();
    }

    init();
</script>
</body>
</html>
