<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360 - High Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #000; color: #fff; overflow: hidden; }
        
        /* Динамические размеры блоков */
        #main-container { display: flex; flex: 1; flex-direction: column-reverse; transition: all 0.4s ease; }
        
        #map { width: 100%; height: 40%; border-top: 1px solid #333; transition: height 0.4s ease; }
        #panorama-container { width: 100%; height: 60%; position: relative; transition: height 0.4s ease; }
        
        /* Состояния развертывания */
        .map-full #map { height: 85%; }
        .map-full #panorama-container { height: 15%; }
        .pano-full #map { height: 10%; }
        .pano-full #panorama-container { height: 90%; }

        #panorama { width: 100%; height: 100%; }
        .leaflet-control-attribution, .leaflet-attribution-flag { display: none !important; }
        
        /* Кнопки */
        .admin-btn { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.6); color: white; border: 1px solid #444; padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        
        #insta-link { position: absolute; top: 15px; right: 15px; z-index: 1000; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 14px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: fadeIn 1s forwards; }

        /* Карточка данных */
        #info-card { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: rgba(20,20,20,0.8); padding: 15px; border-radius: 12px; border: 1px solid #333; backdrop-filter: blur(5px); pointer-events: none; }

        /* Полноэкранная админка */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 5000; display: none; flex-direction: column; padding: 40px 20px; box-sizing: border-box; }
        input { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="expandMap()"></div>
    <div id="panorama-container" onclick="expandPano()">
        <div id="panorama"></div>
        <button class="admin-btn" onclick="event.stopPropagation(); openAdmin()">+ Точка</button>
        <a id="insta-link" href="https://instagram.com/slavaphangan" target="_blank">Instagram Portfolio</a>
        
        <div id="info-card" id="card" style="display:none">
            <b id="card-title" style="font-size:18px"></b><br>
            <span id="card-desc" style="color:#aaa; font-size:13px"></span>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="margin-top:0">Добавить 360° точку</h2>
    <input type="text" id="in-name" placeholder="Название объекта">
    <input type="text" id="in-desc" placeholder="Описание">
    <input type="file" id="in-file" accept="image/*">
    <p style="font-size: 11px; color: #888;">* Сохранение займет время, так как файл не сжимается.</p>
    <button style="background:#007aff; color:white; border:none; padding:18px; border-radius:12px; font-weight:bold;" onclick="savePoint()">ОПУБЛИКОВАТЬ</button>
    <button style="background:none; color:#888; border:none; margin-top:15px;" onclick="closeAdmin()">ОТМЕНА</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    let map, viewer;
    const SUNSET_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzEyOTA3NCwiZXhwIjoxODA4NjY1MDc0fQ.8pY65AdSogP0twllPXJ_30lWR7KcPP9zV6IAqKQz79Q";
    
    let data = JSON.parse(localStorage.getItem('ph_v12') || '[]');
    let clickCoords = null;

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": SUNSET_IMG, "autoLoad": true, "showZoomCtrl": true });

        // Основная точка
        drawMarker({name:'Thong Sala Sunset', coords:{lat:9.7107, lng:99.9813}, img:SUNSET_IMG, desc:'Original Quality Demo'});
        data.forEach(p => drawMarker(p));

        map.on('click', e => { clickCoords = e.latlng; });

        // Таймер на Instagram (180 секунд = 3 минуты)
        setTimeout(() => {
            document.getElementById('insta-link').style.display = 'block';
        }, 180000);
    }

    function drawMarker(p) {
        const m = L.marker(p.coords).addTo(map);
        m.on('click', (e) => {
            L.DomEvent.stopPropagation(e);
            viewer.destroy();
            viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.img, "autoLoad": true });
            document.getElementById('info-card').style.display = 'block';
            document.getElementById('card-title').innerText = p.name;
            document.getElementById('card-desc').innerText = p.desc || "";
            expandPano();
        });
    }

    function expandMap() {
        document.body.className = 'map-full';
        setTimeout(() => map.invalidateSize(), 400);
    }

    function expandPano() {
        document.body.className = 'pano-full';
        setTimeout(() => map.invalidateSize(), 400);
    }

    function openAdmin() {
        if(!clickCoords) return alert("Сначала нажми на карту, чтобы выбрать место!");
        document.getElementById('admin-panel').style.display = 'flex';
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function savePoint() {
        const name = document.getElementById('in-name').value;
        const file = document.getElementById('in-file').files[0];
        if(!name || !file) return alert("Нужны название и файл!");

        const reader = new FileReader();
        reader.onload = (e) => {
            // Сохраняем "как есть" (максимальное качество)
            data.push({
                name: name,
                desc: document.getElementById('in-desc').value,
                coords: clickCoords,
                img: e.target.result // Исходный Base64 без сжатия
            });
            localStorage.setItem('ph_v12', JSON.stringify(data));
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    init();
</script>
</body>
</html>
