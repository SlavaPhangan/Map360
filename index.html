<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #000; color: #fff; overflow: hidden; }
        #main-container { display: flex; flex: 1; flex-direction: column-reverse; overflow: hidden; }
        #map { width: 100%; height: 35%; border-top: 1px solid #222; }
        #panorama-container { width: 100%; height: 65%; position: relative; background: #000; }
        #panorama { width: 100%; height: 100%; }
        .leaflet-control-attribution, .leaflet-attribution-flag { display: none !important; }
        
        /* Скрытая кнопка добавления */
        .controls { position: absolute; top: 15px; right: 15px; z-index: 1000; display: none; }
        .btn { background: #007aff; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 13px; }
        
        #info-card { position: absolute; bottom: 15px; left: 15px; right: 15px; z-index: 1000; background: rgba(20,20,20,0.9); padding: 15px; border-radius: 15px; border: 1px solid #333; backdrop-filter: blur(10px); display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { color: #34c759; font-weight: bold; font-size: 17px; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; display: block; text-align: center; font-weight: bold; margin-top: 12px; font-size: 14px; }

        #admin-panel { position: absolute; bottom: -100%; left: 0; width: 100%; background: #1c1c1e; z-index: 2000; border-radius: 20px 20px 0 0; transition: 0.3s; padding: 20px; box-sizing: border-box; border-top: 1px solid #333; }
        #admin-panel.active { bottom: 0; }
        input { background: #2c2c2e; border: 1px solid #3d3d3f; color: white; padding: 14px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="map"></div>
    <div id="panorama-container">
        <div id="panorama"></div>
        <div class="controls" id="admin-btn-wrap">
            <button class="btn" id="add-btn">+ Локация</button>
        </div>
        
        <div id="info-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="card-title" style="margin:0; font-size: 17px;" onclick="secretClick()"></h3>
                <div class="price" id="card-price"></div>
            </div>
            <div id="card-desc" style="font-size: 12px; color: #aaa; margin-top: 5px;"></div>
            <a id="wa-link" href="#" class="btn-wa" target="_blank">WhatsApp владельца</a>
        </div>
    </div>
</div>

<div id="admin-panel">
    <input type="text" id="in-name" placeholder="Название">
    <input type="text" id="in-price" placeholder="Цена">
    <input type="text" id="in-desc" placeholder="Описание">
    <input type="text" id="in-wa" placeholder="WhatsApp (7999...)">
    <div id="file-box"><input type="file" id="in-file" accept="image/*"></div>
    <input type="hidden" id="in-coords">
    <button class="btn" style="width:100%; padding: 15px; margin-top:10px;" onclick="handleSave()">Сохранить</button>
    <button class="btn" style="width:100%; margin-top:8px; background:none;" onclick="setPanel(false)">Отмена</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    let map, viewer, isAdd = false;
    let viewedPoints = new Set();
    let secretCounter = 0;
    let data = JSON.parse(localStorage.getItem('ph_v10') || '[]');

    const DEMO_IMG = "https://pannellum.org/images/alma.jpg"; 

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.73, 100.01], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": DEMO_IMG, "autoLoad": true, "showZoomCtrl": false });

        drawMarker({id:'demo', name:'Welcome Phangan', coords:{lat:9.71, lng:99.98}, img:DEMO_IMG, desc:'Посмотрите 3 любые точки, чтобы открыть меню добавления.'});
        data.forEach(p => drawMarker(p));

        map.on('click', e => {
            if(!isAdd) return;
            document.getElementById('in-coords').value = JSON.stringify(e.latlng);
            document.getElementById('file-box').style.display = 'block';
            setPanel(true);
        });
    }

    function drawMarker(p) {
        const m = L.marker(p.coords).addTo(map);
        m.on('click', () => {
            viewer.destroy();
            viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.img, "autoLoad": true });
            
            // Логика счетчика просмотров
            viewedPoints.add(p.id || p.name);
            if(viewedPoints.size >= 3) {
                document.getElementById('admin-btn-wrap').style.display = 'block';
            }

            document.getElementById('info-card').style.display = 'block';
            document.getElementById('card-title').innerText = p.name;
            document.getElementById('card-price').innerText = p.price || "";
            document.getElementById('card-desc').innerText = p.desc || "";
            document.getElementById('wa-link').href = "https://wa.me/" + (p.wa || "");
        });
    }

    function secretClick() {
        secretCounter++;
        if(secretCounter >= 5) {
            document.getElementById('admin-btn-wrap').style.display = 'block';
            alert("Меню админа открыто!");
        }
    }

    document.getElementById('add-btn').onclick = () => {
        isAdd = !isAdd;
        document.getElementById('add-btn').innerText = isAdd ? "Ткни на карту" : "+ Локация";
    };

    function setPanel(s) { document.getElementById('admin-panel').classList.toggle('active', s); }

    function handleSave() {
        const name = document.getElementById('in-name').value;
        const file = document.getElementById('in-file').files[0];
        const coords = JSON.parse(document.getElementById('in-coords').value);

        if(!name || (!file && document.getElementById('file-box').style.display !== 'none')) return alert("Данные не полные");

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 2048; canvas.height = 1024;
                canvas.getContext('2d').drawImage(img, 0, 0, 2048, 1024);
                const compressed = canvas.toDataURL('image/jpeg', 0.6);
                data.push({ name, price:document.getElementById('in-price').value, desc:document.getElementById('in-desc').value, wa:document.getElementById('in-wa').value, coords, img: compressed, id: Date.now() });
                localStorage.setItem('ph_v10', JSON.stringify(data));
                location.reload();
            };
            img.src = e.target.result;
        };
        if(file) reader.readAsDataURL(file);
    }

    init();
</script>
</body>
</html>
