<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOH PHANGAN 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; --bg: #000; --ui: rgba(10, 10, 10, 0.85); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        
        /* Заставка с защитой от черного экрана */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        #intro-bg { position: absolute; inset: 0; background: url('https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/public/360%20-10/sunset%20Thong%20Sala.JPG') center/cover; filter: blur(50px); opacity: 0.5; }
        
        .signature { width: 200px; height: 50px; margin-top: 10px; }
        .signature path { fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 3s forwards 1s; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; opacity: 0; transition: 2s; }
        @media (min-width: 1024px) { 
            #main-container { flex-direction: row; } 
            #map { width: 0%; height: 100% !important; border-right: 1px solid var(--border); transition: 1.2s cubic-bezier(0.65, 0, 0.35, 1); } 
            .started #map { width: 35% !important; }
            .started #panorama-container { width: 65% !important; }
        }
        #map { width: 100%; height: 0%; transition: 1.2s ease; background: #050505; }
        .started #map { height: 40%; }
        #panorama-container { width: 100%; height: 100%; position: relative; }

        /* Маркеры и подписи */
        .custom-marker { display: flex; flex-direction: column; align-items: center; }
        .marker-disk { width: 24px; height: 24px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .marker-label { font-size: 11px; color: #fff; text-shadow: 0 1px 4px #000; margin-top: 4px; white-space: nowrap; transition: 0.3s; opacity: 0; }
        .zoom-high .marker-label { opacity: 1; }

        /* Админка в карте */
        #admin-map-overlay { position: absolute; bottom: 20px; left: 20px; z-index: 1000; display: none; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,122,255,0.4); }

        #admin-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 400px; background: var(--ui); backdrop-filter: blur(30px); z-index: 5000; display: none; flex-direction: column; padding: 30px; border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="intro">
    <div id="intro-bg"></div>
    <h1 style="letter-spacing: 5px; margin:0;">KOH PHANGAN 360</h1>
    <svg class="signature" viewBox="0 0 200 50">
        <path d="M20,35 Q40,10 60,35 T100,35 T140,35 T180,35" />
        <text x="30" y="45" font-family="cursive" font-size="14" fill="white" style="opacity: 0.6;">by Slava Lagoykin</text>
    </svg>
</div>

<div id="main-container">
    <div id="map">
        <div id="admin-map-overlay"><button class="btn-add" onclick="openAdmin(null)">+ ADD NEW POINT</button></div>
    </div>
    <div id="panorama-container">
        <div id="panorama"></div>
        <div id="top-info" style="position:absolute; top:20px; right:20px; z-index:2000; text-align:right;">
            <h2 id="trigger-title" style="margin:0; font-size:20px; color:var(--accent); cursor:pointer;">KOH PHANGAN 360</h2>
            <p id="cur-name" style="margin:4px 0 0; font-size:12px; opacity:0.6;">by Slava Lagoykin</p>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="margin-top:0">Edit Point</h2>
    <input type="hidden" id="edit-id">
    <label>Title</label><input type="text" id="in-name">
    <label>Supabase URL</label><input type="text" id="in-url">
    <label>WhatsApp (+995511443298)</label><input type="text" id="in-wa">
    <label>Time of day</label>
    <select id="in-time"><option value="day">☀️ Day</option><option value="sunset">🌅 Sunset</option><option value="sunrise">🌄 Sunrise</option></select>
    <button class="btn-add" style="width:100%; padding:20px;" onclick="save()">SAVE CHANGES</button>
    <button id="del-btn" style="background:#ff3b30; color:white; border:none; width:100%; padding:15px; border-radius:12px; margin-top:10px; display:none;" onclick="deletePt()">DELETE</button>
    <button onclick="closeAdmin()" style="background:none; border:none; color:#555; width:100%; margin-top:20px;">CANCEL</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    const SB_URL = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co";
    const SB_KEY = "sb_publishable_q3-RdBxHFY0kcpfrNTJ0-w_2E14iJhf";
    const START_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/public/360%20-10/sunset%20Thong%20Sala.JPG";

    let map, viewer, points = [], clickCoords = null, adminClicks = 0;
    let isAdmin = localStorage.getItem('slava_admin') === 'true';

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            document.getElementById('main-container').style.opacity = '1';
            setTimeout(() => {
                document.body.classList.add('started');
                init();
            }, 500);
            setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 1500);
        }, 4000); // 4 секунды на анимацию подписи и лого
    };

    async function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        map.on('zoomend', () => {
            const z = map.getZoom();
            document.getElementById('map').className = z > 13 ? 'zoom-high' : '';
        });

        if(isAdmin) document.getElementById('admin-map-overlay').style.display = 'block';

        document.getElementById('trigger-title').onclick = () => {
            adminClicks++;
            if(adminClicks >= 3) {
                if(prompt("Pass:") === "1234") { localStorage.setItem('slava_admin', 'true'); location.reload(); }
                adminClicks = 0;
            }
        };

        await load();
        map.on('click', e => { 
            if(isAdmin) { 
                clickCoords = e.latlng; 
                // Создаем временный маркер, чтобы видеть, куда ткнули
                L.circleMarker(e.latlng, {radius:10, color: '#007aff'}).addTo(map);
                openAdmin(null); 
            } 
        });
    }

    async function load() {
        const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
        const data = await res.json();
        points = [{id:'fixed', name:'Welcome Sunset', url:START_IMG, coords:{lat:9.7107, lng:99.9813}, time:'sunset'}, ...data];
        
        points.forEach((p, i) => {
            const sym = p.time === 'sunset' ? '🌅' : (p.time === 'sunrise' ? '🌄' : '☀️');
            const icon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-disk">${sym}</div><div class="marker-label">${p.name}</div>`,
                iconSize: [30, 45]
            });
            const m = L.marker(p.coords, { icon, draggable: isAdmin && p.id !== 'fixed' }).addTo(map);
            m.on('click', (e) => { 
                L.DomEvent.stopPropagation(e);
                loadPano(p); 
                if(isAdmin && p.id !== 'fixed') openAdmin(i); 
            });
        });
        loadPano(points[0]);
    }

    function loadPano(p) {
        if(viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.url, "autoLoad": true, "showZoomCtrl": false });
        document.getElementById('cur-name').innerText = p.name;
    }

    function openAdmin(idx) {
        document.getElementById('admin-panel').style.display = 'flex';
        if(idx !== null) {
            const p = points[idx];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('in-name').value = p.name;
            document.getElementById('in-url').value = p.url;
            document.getElementById('in-wa').value = p.wa || '';
            document.getElementById('in-time').value = p.time || 'day';
            document.getElementById('del-btn').style.display = 'block';
        } else {
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('#admin-panel input').forEach(i => i.value = '');
            document.getElementById('del-btn').style.display = 'none';
        }
    }

    async function save() {
        const id = document.getElementById('edit-id').value;
        const body = { name: document.getElementById('in-name').value, url: document.getElementById('in-url').value, wa: document.getElementById('in-wa').value, time: document.getElementById('in-time').value };
        if(id) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        } else {
            body.coords = clickCoords;
            await fetch(`${SB_URL}/rest/v1/locations`, { method: 'POST', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        }
        location.reload();
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function deletePt() { if(confirm("Delete?")) { fetch(`${SB_URL}/rest/v1/locations?id=eq.${document.getElementById('edit-id').value}`, { method: 'DELETE', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } }).then(() => location.reload()); } }
</script>
</body>
</html>
