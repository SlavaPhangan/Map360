<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOH PHANGAN 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; --bg: #000; --ui: rgba(15, 15, 15, 0.9); --border: rgba(255,255,255,0.15); }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; }
        @media (min-width: 1024px) { #main-container { flex-direction: row; } #map { width: 30% !important; height: 100% !important; border-right: 1px solid var(--border); } #panorama-container { width: 70% !important; height: 100% !important; } }
        #map { width: 100%; height: 35%; border-top: 1px solid var(--border); transition: height 0.4s ease; }
        #panorama-container { width: 100%; height: 65%; position: relative; transition: height 0.4s ease; }
        .map-full #map { height: 85%; } .pano-full #map { height: 15%; }
        #panorama { width: 100%; height: 100%; background: #000; }
        .ui-card { position: absolute; z-index: 2000; background: var(--ui); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 14px; padding: 15px; }
        #top-info { top: 15px; right: 15px; text-align: right; cursor: pointer; }
        .btn-wa { background: #25d366; color: #fff; text-decoration: none; padding: 10px 15px; border-radius: 8px; display: inline-block; font-size: 13px; font-weight: 600; margin-top: 10px; }
        .dot-marker { width: 10px; height: 10px; background: #fff; border: 2px solid #000; border-radius: 50%; }
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; overflow-y: auto; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 16px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapFocus()"></div>
    <div id="panorama-container" onclick="handlePanoFocus()">
        <div id="panorama"></div>
        <div id="top-info" class="ui-card" onclick="checkAuth()">
            <h2 style="margin:0; font-size:18px; color:var(--accent);">KOH PHANGAN 360</h2>
            <p id="display-title" style="margin:4px 0 0; font-size:13px; opacity:0.7;">Exploring...</p>
            <div id="wa-wrap"></div>
        </div>
        <div id="admin-ui" style="position:absolute; top:15px; left:15px; z-index:2000; display:none;">
            <button class="btn-wa" style="background:var(--accent)" onclick="event.stopPropagation(); openAdmin(null)">+ ADD POINT</button>
        </div>
        <div style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); z-index:2000; display:flex; gap:60px;">
            <button style="background:none; border:none; color:white; font-size:40px; cursor:pointer;" onclick="event.stopPropagation(); navigate(-1)">‹</button>
            <button style="background:none; border:none; color:white; font-size:40px; cursor:pointer;" onclick="event.stopPropagation(); navigate(1)">›</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2>Management</h2>
    <input type="hidden" id="edit-id">
    <input type="text" id="in-name" placeholder="Name">
    <input type="text" id="in-url" placeholder="URL">
    <input type="text" id="in-wa" placeholder="WhatsApp">
    <input type="text" id="in-desc" placeholder="Description">
    <select id="in-time"><option value="day">Day</option><option value="sunset">Sunset</option><option value="sunrise">Sunrise</option></select>
    <button class="btn-wa" style="background:var(--accent); width:100%; padding:20px;" onclick="save()">SAVE</button>
    <button id="del-btn" class="btn-wa" style="background:#ff3b30; width:100%; margin-top:10px; display:none;" onclick="deletePt()">DELETE</button>
    <button class="btn-wa" style="background:none; width:100%; color:#555;" onclick="closeAdmin()">CANCEL</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    async function init() {

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        if(isAdmin) document.getElementById('admin-ui').style.display = 'flex';
        await load();
        map.on('click', e => { if(isAdmin) { clickCoords = e.latlng; openAdmin(null); } });
    }

    function checkAuth() { if(!isAdmin && prompt("Password:") === "1234") { localStorage.setItem('slava_admin', 'true'); location.reload(); } }

    async function load() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
            const data = await res.json();

            renderMarkers();
            loadPano(points[0]);
        }
    }
