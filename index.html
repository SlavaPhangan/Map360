<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360 - Database Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; }
        
        @media (min-width: 1024px) {
            #main-container { flex-direction: row; }
            #map { width: 30% !important; height: 100% !important; border-right: 1px solid #222; }
            #panorama-container { width: 70% !important; height: 100% !important; }
        }
        
        #map { width: 100%; height: 35%; border-top: 1px solid #333; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #panorama-container { width: 100%; height: 65%; position: relative; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .map-full #map { height: 85%; }
        .map-full #panorama-container { height: 15%; }
        .pano-full #map { height: 10%; }
        .pano-full #panorama-container { height: 90%; }

        #panorama { width: 100%; height: 100%; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        .ui-controls { position: absolute; top: 15px; left: 15px; z-index: 2000; }
        .btn-ui { background: rgba(30,30,30,0.8); color: white; border: 1px solid #444; padding: 12px 18px; border-radius: 12px; font-weight: 600; backdrop-filter: blur(10px); }
        
        #top-info { position: absolute; top: 15px; right: 15px; z-index: 2000; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 12px; text-align: right; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        
        .nav-arrows { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; gap: 50px; }
        .arrow-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); width: 55px; height: 55px; border-radius: 50%; font-size: 28px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }

        .marker-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .marker-icon { width: 34px; height: 34px; background: rgba(0,122,255,0.15); border: 2px solid var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .marker-label { background: rgba(0,0,0,0.75); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }

        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 16px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapClick()"></div>
    <div id="panorama-container" onclick="handlePanoClick()">
        <div id="panorama"></div>
        <div id="top-info" style="display:none"><h2 id="display-title" style="margin:0; font-size:18px; color:var(--accent);"></h2><p id="display-desc" style="margin:3px 0 0; font-size:12px; color:#ccc;"></p></div>
        <div class="ui-controls"><button class="btn-ui" onclick="event.stopPropagation(); openAdmin()">+ Добавить</button></div>
        <div class="nav-arrows">
            <button class="arrow-btn" onclick="event.stopPropagation(); navigatePano(-1)">‹</button>
            <button class="arrow-btn" onclick="event.stopPropagation(); navigatePano(1)">›</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="margin-top:0">Новая точка в Облако</h2>
    <input type="text" id="in-name" placeholder="Название">
    <input type="text" id="in-url" placeholder="Прямая ссылка (Supabase URL)">
    <input type="text" id="in-desc" placeholder="Описание">
    <select id="in-time"><option value="day">☀️ День</option><option value="sunset">🌅 Закат</option><option value="sunrise">🌄 Рассвет</option></select>
    <button class="btn-ui" style="background:var(--accent); border:none; width:100%; padding:20px; font-size:16px;" onclick="saveToSupabase()">ОПУБЛИКОВАТЬ ДЛЯ ВСЕХ</button>
    <button class="btn-ui" style="background:none; border:none; width:100%; margin-top:10px; color:#555;" onclick="closeAdmin()">ОТМЕНА</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    const SB_URL = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co";
    const SB_KEY = "sb_publishable_q3-RdBxHFY0kcpfrNTJ0-w_2E14iJhf";
    
    let map, viewer, clickCoords = null;
    let allPoints = [];
    let currentIndex = 0;

    async function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        await loadFromSupabase();
        map.on('click', e => { clickCoords = e.latlng; });
    }

    async function loadFromSupabase() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            allPoints = await res.json();
            if(allPoints.length > 0) {
                loadPano(allPoints[0]);
                allPoints.forEach((p, idx) => drawMarker(p, idx));
            }
        } catch (e) { console.error("Ошибка загрузки:", e); }
    }

    function drawMarker(p, index) {
        const icons = { day: '☀️', sunset: '🌅', sunrise: '🌄' };
        const icon = L.divIcon({
            className: 'marker-wrapper',
            html: `<div class="marker-icon">${icons[p.time || 'day']}</div><div class="marker-label">${p.name}</div>`,
            iconSize: [50, 50], iconAnchor: [25, 50]
        });
        const m = L.marker(p.coords, {icon}).addTo(map);
        m.on('click', e => { L.DomEvent.stopPropagation(e); currentIndex = index; loadPano(p); handlePanoClick(); });
    }

    function loadPano(p) {
        if (viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.url, "autoLoad": true, "showZoomCtrl": false });
        document.getElementById('top-info').style.display = 'block';
        document.getElementById('display-title').innerText = p.name;
        document.getElementById('display-desc').innerText = p.description || "";
    }

    async function saveToSupabase() {
        const name = document.getElementById('in-name').value;
        const url = document.getElementById('in-url').value;
        if(!name || !url || !clickCoords) return alert("Выбери место на карте и заполни данные!");

        const newLoc = { name, url, description: document.getElementById('in-desc').value, coords: clickCoords, time: document.getElementById('in-time').value };

        await fetch(`${SB_URL}/rest/v1/locations`, {
            method: 'POST',
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
            body: JSON.stringify(newLoc)
        });
        location.reload();
    }

    function handleMapClick() { document.body.className = 'map-full'; setTimeout(() => { map.invalidateSize(); if(viewer) viewer.resize(); }, 450); }
    function handlePanoClick() { document.body.className = 'pano-full'; setTimeout(() => { map.invalidateSize(); if(viewer) viewer.resize(); }, 450); }
    function openAdmin() { if(!clickCoords) return alert("Ткни в карту!"); document.getElementById('admin-panel').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function navigatePano(dir) { currentIndex = (currentIndex + dir + allPoints.length) % allPoints.length; loadPano(allPoints[currentIndex]); }

    init();
</script>
</body>
</html>
