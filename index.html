<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOH PHANGAN 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; --bg: #000; --ui: rgba(10, 10, 10, 0.8); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        
        /* Заставка */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #intro h1 { font-size: 24px; letter-spacing: 5px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.5; } to { opacity: 1; } }

        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; opacity: 0; transition: opacity 1.5s ease; }
        
        @media (min-width: 1024px) { 
            #main-container { flex-direction: row; } 
            #map { width: 0%; height: 100% !important; border-right: 1px solid var(--border); transition: width 1.2s cubic-bezier(0.65, 0, 0.35, 1); } 
            #panorama-container { width: 100%; height: 100% !important; }
            .started #map { width: 30% !important; }
            .started #panorama-container { width: 70% !important; }
        }
        
        #map { width: 100%; height: 0%; border-top: 1px solid var(--border); transition: height 1.2s cubic-bezier(0.65, 0, 0.35, 1); }
        #panorama-container { width: 100%; height: 100%; position: relative; }
        .started #map { height: 35%; }
        .started #panorama-container { height: 65%; }

        #panorama { width: 100%; height: 100%; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        /* UI */
        .ui-card { position: absolute; z-index: 2000; background: var(--ui); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 15px; }
        #top-info { top: 20px; right: 20px; text-align: right; }
        #mode-tag { font-size: 9px; text-transform: uppercase; opacity: 0.4; letter-spacing: 1px; margin-top: 5px; }

        .dot-marker { width: 10px; height: 10px; background: #fff; border: 2px solid #000; border-radius: 50%; }
        .btn-wa { background: #25d366; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 8px; display: inline-block; font-size: 12px; font-weight: 600; margin-top: 8px; }
        
        #admin-btn { position: absolute; top: 20px; left: 20px; z-index: 2000; display: none; }
        
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="intro"><h1>KOH PHANGAN 360</h1></div>

<div id="main-container">
    <div id="map"></div>
    <div id="panorama-container">
        <div id="panorama"></div>
        
        <div id="top-info" class="ui-card">
            <h2 id="trigger-title" style="margin:0; font-size:18px; color:var(--accent); cursor:pointer;">KOH PHANGAN 360</h2>
            <p id="display-title" style="margin:4px 0 0; font-size:13px; opacity:0.7;">Loading...</p>
            <div id="wa-wrap"></div>
            <div id="mode-tag">guest mode</div>
        </div>

        <div id="admin-btn">
            <button class="btn-wa" style="background:var(--accent)" onclick="openAdmin(null)">+ ADD POINT</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <h2 id="adm-head">Management</h2>
    <input type="hidden" id="edit-id">
    <input type="text" id="in-name" placeholder="Name">
    <input type="text" id="in-url" placeholder="URL">
    <input type="text" id="in-wa" placeholder="WhatsApp">
    <button class="btn-wa" style="background:var(--accent); width:100%; padding:20px;" onclick="save()">SAVE</button>
    <button id="del-btn" class="btn-wa" style="background:#ff3b30; width:100%; margin-top:10px; display:none;" onclick="deletePt()">DELETE</button>
    <button class="btn-wa" style="background:none; width:100%; color:#555;" onclick="closeAdmin()">CANCEL</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    const SB_URL = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co";
    const SB_KEY = "sb_publishable_q3-RdBxHFY0kcpfrNTJ0-w_2E14iJhf";
    const START_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzI1Mzk5NiwiZXhwIjoxODA4Nzg5OTk2fQ.2i0dDc-TtQz_WqDbUWwHpzDKt1EkWYAxrMkjuBkU9hc";

    let map, viewer, points = [], clickCoords = null, adminClicks = 0;
    let isAdmin = localStorage.getItem('slava_admin') === 'true';

    // АНИМАЦИЯ СТАРТА
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            document.getElementById('main-container').style.opacity = '1';
            setTimeout(() => {
                document.body.classList.add('started');
                init();
                setTimeout(() => { if(map) map.invalidateSize(); }, 1200);
            }, 500);
            setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 1500);
        }, 2000);
    };

    async function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        if(isAdmin) {
            document.getElementById('admin-btn').style.display = 'block';
            document.getElementById('mode-tag').innerText = 'admin mode';
            document.getElementById('mode-tag').style.color = 'var(--accent)';
        }

        document.getElementById('trigger-title').onclick = () => {
            adminClicks++;
            if(adminClicks >= 3) {
                if(prompt("Password:") === "1234") {
                    localStorage.setItem('slava_admin', 'true');
                    location.reload();
                }
                adminClicks = 0;
            }
        };

        await load();
        map.on('click', e => { if(isAdmin) { clickCoords = e.latlng; openAdmin(null); } });
    }

    async function load() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
            const data = await res.json();
            points = [{id:'fixed', name:'Sunset Welcome', url:START_IMG, coords:{lat:9.7107, lng:99.9813}}, ...data];
            points.forEach((p, i) => {
                const icon = L.divIcon({ className: 'dot-marker', iconSize: [10, 10] });
                const m = L.marker(p.coords, { icon, draggable: isAdmin && p.id !== 'fixed' }).addTo(map);
                m.on('click', () => { loadPano(p); if(isAdmin && p.id !== 'fixed') openAdmin(i); });
                m.on('dragend', async e => {
                    await fetch(`${SB_URL}/rest/v1/locations?id=eq.${p.id}`, {
                        method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ coords: e.target.getLatLng() })
                    });
                });
            });
            loadPano(points[0]);
        } catch(e) { loadPano({name:'Offline', url:START_IMG}); }
    }

    function loadPano(p) {
        if(viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.url, "autoLoad": true, "showZoomCtrl": false });
        document.getElementById('display-title').innerText = p.name;
        document.getElementById('wa-wrap').innerHTML = p.wa ? `<a href="https://wa.me/${p.wa}" class="btn-wa" target="_blank">WhatsApp</a>` : '';
    }

    function openAdmin(idx) {
        document.getElementById('admin-panel').style.display = 'flex';
        if(idx !== null) {
            const p = points[idx];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('in-name').value = p.name;
            document.getElementById('in-url').value = p.url;
            document.getElementById('in-wa').value = p.wa || '';
            document.getElementById('del-btn').style.display = 'block';
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('del-btn').style.display = 'none';
        }
    }

    async function save() {
        const id = document.getElementById('edit-id').value;
        const body = { name: document.getElementById('in-name').value, url: document.getElementById('in-url').value, wa: document.getElementById('in-wa').value };
        if(id) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        } else {
            if(!clickCoords) return alert("Tap map first!");
            body.coords = clickCoords;
            await fetch(`${SB_URL}/rest/v1/locations`, { method: 'POST', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        }
        location.reload();
    }

    async function deletePt() {
        if(confirm("Delete?")) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${document.getElementById('edit-id').value}`, { method: 'DELETE', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
            location.reload();
        }
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
</script>
</body>
</html>
