<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOH PHANGAN 360</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; --bg: #000; --ui: rgba(15, 15, 15, 0.9); --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        
        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; }
        @media (min-width: 1024px) { 
            #main-container { flex-direction: row; } 
            #map { width: 30% !important; height: 100% !important; border-right: 1px solid var(--border); } 
            #panorama-container { width: 70% !important; height: 100% !important; }
        }
        
        #map { width: 100%; height: 35%; border-top: 1px solid var(--border); transition: height 0.4s ease; }
        #panorama-container { width: 100%; height: 65%; position: relative; transition: height 0.4s ease; }
        
        .map-full #map { height: 85%; } .pano-full #map { height: 10%; }
        #panorama { width: 100%; height: 100%; }
        .leaflet-control-attribution { display: none !important; }

        /* Превью-карточка */
        #preview-card { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 3000; background: var(--ui); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: none; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .logo-360 { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 0 20px rgba(0,122,255,0.4); border: 3px solid rgba(255,255,255,0.2); }
        
        .btn-wa { background: #25d366; color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-top: 10px; }

        #top-info { position: absolute; top: 15px; right: 15px; z-index: 2000; background: var(--ui); padding: 10px 15px; border-radius: 12px; text-align: right; border: 1px solid var(--border); cursor: pointer; }
        .dot-marker { width: 12px; height: 12px; background: #fff; border: 2px solid #000; border-radius: 50%; }

        .shot-btn { position: absolute; bottom: 20px; left: 20px; z-index: 2000; background: var(--ui); border: 1px solid var(--border); color: #fff; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapFocus()"></div>
    <div id="panorama-container" onclick="handlePanoFocus()">
        <div id="panorama"></div>
        
        <div id="top-info" onclick="checkAuth()">
            <h2 style="margin:0; font-size:18px; color:var(--accent);">KOH PHANGAN 360</h2>
            <p id="cur-name" style="margin:4px 0 0; font-size:13px; opacity:0.7;">Explore the Island</p>
        </div>

        <div id="preview-card">
            <div class="logo-360" onclick="enterPano()">360</div>
            <h3 id="pre-title" style="margin:5px 0 0; font-size:18px;"></h3>
            <p id="pre-desc" style="margin:5px 0 0; font-size:13px; opacity:0.6;"></p>
            <div id="pre-wa"></div>
            <button onclick="closePreview()" style="background:none; border:none; color:#555; margin-top:10px; font-size:12px;">Закрыть</button>
        </div>

        <div id="admin-controls" style="position:absolute; top:15px; left:15px; z-index:2000; display:none;">
            <button class="btn-wa" style="background:var(--accent)" onclick="event.stopPropagation(); openAdmin(null)">+ ADD POINT</button>
        </div>

        <button class="shot-btn" onclick="event.stopPropagation(); takeScreenshot()">📸</button>
    </div>
</div>

<div id="admin-panel">
    <h2>Admin Panel</h2>
    <input type="hidden" id="edit-id">
    <input type="text" id="in-name" placeholder="Name">
    <input type="text" id="in-url" placeholder="Supabase Image URL">
    <input type="text" id="in-wa" placeholder="WhatsApp (79...)">
    <input type="text" id="in-desc" placeholder="Description">
    <select id="in-time" style="background:#1a1a1a; color:white; padding:15px; border-radius:10px; width:100%; margin-bottom:10px;">
        <option value="day">Day</option><option value="sunset">Sunset</option><option value="sunrise">Sunrise</option>
    </select>
    <button class="btn-wa" style="background:var(--accent); width:100%; padding:15px;" onclick="save()">SAVE</button>
    <button id="del-btn" class="btn-wa" style="background:#ff3b30; width:100%; margin-top:10px; display:none;" onclick="deletePt()">DELETE</button>
    <button class="btn-wa" style="background:none; width:100%; color:#555;" onclick="closeAdmin()">CANCEL</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    const SB_URL = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co";
    const SB_KEY = "sb_publishable_q3-RdBxHFY0kcpfrNTJ0-w_2E14iJhf";
    const START_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzEyOTA3NCwiZXhwIjoxODA4NjY1MDc0fQ.8pY65AdSogP0twllPXJ_30lWR7KcPP9zV6IAqKQz79Q";

    let map, viewer, points = [], activeIdx = 0, clickCoords = null;
    let isAdmin = localStorage.getItem('slava_admin') === 'true';

    async function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        if(isAdmin) document.getElementById('admin-controls').style.display = 'block';
        await load();
        map.on('click', e => { if(isAdmin) { clickCoords = e.latlng; openAdmin(null); } });
    }

    function checkAuth() { if(!isAdmin && prompt("Password:") === "1234") { localStorage.setItem('slava_admin', 'true'); location.reload(); } }

    async function load() {
        const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
        const data = await res.json();
        points = [{id:'fixed', name:'Thong Sala Sunset', url:START_IMG, coords:{lat:9.7107, lng:99.9813}, time:'sunset', wa:'79242551410'}, ...data];
        renderMarkers();
        loadPano(points[0]);
    }

    function renderMarkers() {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        points.forEach((p, i) => {
            const icon = L.divIcon({ className: 'dot-marker', iconSize: [12, 12] });
            const m = L.marker(p.coords, { icon, draggable: isAdmin && p.id !== 'fixed' }).addTo(map);
            m.on('click', e => { 
                L.DomEvent.stopPropagation(e); 
                showPreview(i); 
            });
            m.on('dragend', async e => {
                await fetch(`${SB_URL}/rest/v1/locations?id=eq.${p.id}`, {
                    method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ coords: e.target.getLatLng() })
                });
            });
        });
    }

    function showPreview(i) {
        activeIdx = i;
        const p = points[i];
        document.getElementById('preview-card').style.display = 'flex';
        document.getElementById('pre-title').innerText = p.name;
        document.getElementById('pre-desc').innerText = p.description || '';
        document.getElementById('pre-wa').innerHTML = p.wa ? `<a href="https://wa.me/${p.wa}" class="btn-wa" target="_blank">WhatsApp</a>` : '';
    }

    function enterPano() {
        loadPano(points[activeIdx]);
        closePreview();
        handlePanoFocus();
        if(isAdmin && points[activeIdx].id !== 'fixed') openAdmin(activeIdx);
    }

    function loadPano(p) {
        if(viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', { 
            "type": "equirectangular", "panorama": p.url, "autoLoad": true, "showZoomCtrl": false, "crossOrigin": "anonymous" 
        });
        document.getElementById('cur-name').innerText = p.name;
    }

    function takeScreenshot() {
        const canvas = document.querySelector('.pnlm-render-container canvas');
        if(!canvas) return;
        const temp = document.createElement('canvas');
        temp.width = canvas.width; temp.height = canvas.height;
        const ctx = temp.getContext('2d');
        ctx.drawImage(canvas, 0, 0);
        ctx.font = "bold 30px sans-serif"; ctx.fillStyle = "white"; ctx.textAlign = "right";
        ctx.shadowColor = "black"; ctx.shadowBlur = 8;
        ctx.fillText("Slava Lagoykin", temp.width - 40, temp.height - 40);
        const link = document.createElement('a'); link.download = `KOH_PHANGAN_360_${Date.now()}.png`; link.href = temp.toDataURL("image/png"); link.click();
    }

    function openAdmin(idx) {
        document.getElementById('admin-panel').style.display = 'flex';
        if(idx !== null) {
            const p = points[idx];
            document.getElementById('edit-id').value = p.id;
            document.getElementById('in-name').value = p.name;
            document.getElementById('in-url').value = p.url;
            document.getElementById('in-wa').value = p.wa || '';
            document.getElementById('del-btn').style.display = 'block';
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('del-btn').style.display = 'none';
        }
    }

    async function save() {
        const id = document.getElementById('edit-id').value;
        const body = { name: document.getElementById('in-name').value, url: document.getElementById('in-url').value, wa: document.getElementById('in-wa').value, description: document.getElementById('in-desc').value, time: document.getElementById('in-time').value };
        if(id) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        } else {
            body.coords = clickCoords;
            await fetch(`${SB_URL}/rest/v1/locations`, { method: 'POST', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        }
        location.reload();
    }

    async function deletePt() {
        const id = document.getElementById('edit-id').value;
        if(confirm("Delete?")) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'DELETE', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
            location.reload();
        }
    }

    function closePreview() { document.getElementById('preview-card').style.display = 'none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function handleMapFocus() { if(window.innerWidth < 1024) document.body.className = 'map-full'; setTimeout(() => { map.invalidateSize(); if(viewer) viewer.resize(); }, 400); }
    function handlePanoFocus() { if(window.innerWidth < 1024) document.body.className = 'pano-full'; setTimeout(() => { map.invalidateSize(); if(viewer) viewer.resize(); }, 400); }

    init();
</script>
</body>
</html>
