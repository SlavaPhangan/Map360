<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360 Minimal - v4.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --bg: #000; --ui-bg: rgba(20, 20, 20, 0.9); --border: rgba(255,255,255,0.15); }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; background: var(--bg); color: #fff; overflow: hidden; }
        
        #main-container { display: flex; height: 100vh; width: 100vw; flex-direction: column-reverse; }
        @media (min-width: 1024px) { 
            #main-container { flex-direction: row; } 
            #map { width: 35% !important; height: 100% !important; border-right: 1px solid var(--border); } 
            #panorama-container { width: 65% !important; height: 100% !important; } 
        }
        
        #map { width: 100%; height: 40%; border-top: 1px solid var(--border); transition: height 0.4s ease; }
        #panorama-container { width: 100%; height: 60%; position: relative; transition: height 0.4s ease; }
        
        .map-full #map { height: 90%; } .map-full #panorama-container { height: 10%; }
        .pano-full #map { height: 15%; } .pano-full #panorama-container { height: 85%; }

        #panorama { width: 100%; height: 100%; background: #000; }
        .leaflet-control-attribution { display: none !important; }

        /* Маркеры без эмодзи и синевы */
        .dot-marker { width: 12px; height: 12px; background: #fff; border: 2px solid #000; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .dot-marker.active { background: #fff; border-color: #fff; transform: scale(1.3); box-shadow: 0 0 15px rgba(255,255,255,0.5); }

        /* Панели UI */
        .ui-panel { position: absolute; z-index: 3000; background: var(--ui-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        #top-info { top: 15px; right: 15px; text-align: right; pointer-events: auto; cursor: pointer; }
        
        #admin-editor { bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        input, select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; }
        .btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-danger { background: #ff3b30; color: #fff; }

        /* Стили Popup */
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: #fff; border-radius: 12px; border: 1px solid var(--border); }
        .leaflet-popup-tip { background: #1a1a1a; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapFocus()"></div>
    <div id="panorama-container" onclick="handlePanoFocus()">
        <div id="panorama"></div>
        <div id="top-info" class="ui-panel" onclick="checkAuth()">
            <h2 id="display-title" style="margin:0; font-size:16px;">Phangan 360</h2>
            <p id="display-desc" style="margin:4px 0 0; font-size:11px; opacity:0.6;">by Slava Lagoykin</p>
        </div>
        
        <button onclick="takeScreenshot()" style="position:absolute; top:15px; left:15px; z-index:2000; background:var(--ui-bg); border:1px solid var(--border); color:white; width:44px; height:44px; border-radius:12px;">📸</button>
    </div>
</div>

<div id="admin-editor" class="ui-panel">
    <h3 id="panel-mode" style="margin:0 0 15px 0; font-size:16px;">Добавить точку</h3>
    <input type="hidden" id="edit-id">
    <input type="text" id="in-name" placeholder="Название места">
    <input type="text" id="in-url" placeholder="URL панорамы">
    <input type="text" id="in-desc" placeholder="Описание (необязательно)">
    <select id="in-time">
        <option value="day">День</option>
        <option value="sunset">Закат</option>
        <option value="sunrise">Рассвет</option>
    </select>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:2" onclick="saveData()">Сохранить</button>
        <button id="del-btn" class="btn btn-danger" style="flex:1; display:none;" onclick="deletePoint()">Удалить</button>
    </div>
    <button class="btn btn-secondary" onclick="closeEditor()">Отмена</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    const SB_URL = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co";
    const SB_KEY = "sb_publishable_q3-RdBxHFY0kcpfrNTJ0-w_2E14iJhf";
    const FIXED_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzEyOTA3NCwiZXhwIjoxODA4NjY1MDc0fQ.8pY65AdSogP0twllPXJ_30lWR7KcPP9zV6IAqKQz79Q";

    let map, viewer, clickCoords = null, allPoints = [], curIdx = 0;
    let isAdmin = localStorage.getItem('slava_admin') === 'true';

    async function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        await loadData();
        
        map.on('click', e => {
            if(!isAdmin) return;
            clickCoords = e.latlng;
            openEditor(null); // Открыть для новой точки
        });
    }

    function checkAuth() { if(prompt("Пароль:") === "1234") { localStorage.setItem('slava_admin', 'true'); location.reload(); } }

    async function loadData() {
        const res = await fetch(`${SB_URL}/rest/v1/locations?select=*`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
        const data = await res.json();
        allPoints = [{id: 'fixed', name: 'Thong Sala Sunset', description: 'Starting Point', url: FIXED_IMG, coords: {lat: 9.7107, lng: 99.9813}, time: 'sunset'}, ...data];
        renderMarkers();
        loadPano(allPoints[0]);
    }

    function renderMarkers() {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        allPoints.forEach((p, i) => {
            const icon = L.divIcon({ className: `dot-marker ${i === curIdx ? 'active' : ''}`, iconSize: [12, 12] });
            const m = L.marker(p.coords, { icon, draggable: isAdmin && p.id !== 'fixed' }).addTo(map);
            
            m.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                curIdx = i;
                loadPano(p);
                if(isAdmin && p.id !== 'fixed') openEditor(i);
            });

            m.on('dragend', async (e) => {
                await fetch(`${SB_URL}/rest/v1/locations?id=eq.${p.id}`, {
                    method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ coords: e.target.getLatLng() })
                });
            });
        });
    }

    function openEditor(idx) {
        const panel = document.getElementById('admin-editor');
        panel.style.display = 'flex';
        const delBtn = document.getElementById('del-btn');
        
        if(idx !== null) {
            const p = allPoints[idx];
            document.getElementById('panel-mode').innerText = "Редактировать точку";
            document.getElementById('edit-id').value = p.id;
            document.getElementById('in-name').value = p.name;
            document.getElementById('in-url').value = p.url;
            document.getElementById('in-desc').value = p.description;
            document.getElementById('in-time').value = p.time;
            delBtn.style.display = 'block';
        } else {
            document.getElementById('panel-mode').innerText = "Новая точка";
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('#admin-editor input').forEach(i => i.value = '');
            delBtn.style.display = 'none';
        }
    }

    function closeEditor() { document.getElementById('admin-editor').style.display = 'none'; }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const body = { 
            name: document.getElementById('in-name').value, 
            url: document.getElementById('in-url').value, 
            description: document.getElementById('in-desc').value, 
            time: document.getElementById('in-time').value 
        };

        if(id) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        } else {
            body.coords = clickCoords;
            await fetch(`${SB_URL}/rest/v1/locations`, { method: 'POST', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        }
        location.reload();
    }

    async function deletePoint() {
        const id = document.getElementById('edit-id').value;
        if(confirm("Удалить точку?")) {
            await fetch(`${SB_URL}/rest/v1/locations?id=eq.${id}`, { method: 'DELETE', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
            location.reload();
        }
    }

    function loadPano(p) {
        if (viewer) viewer.destroy();
        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.url, "autoLoad": true, "showZoomCtrl": false });
        document.getElementById('display-title').innerText = p.name;
        document.getElementById('display-desc').innerText = p.description || "by Slava Lagoykin";
        renderMarkers();
    }

    function takeScreenshot() {
        const canvas = document.querySelector('.pnlm-render-container canvas');
        const temp = document.createElement('canvas');
        temp.width = canvas.width; temp.height = canvas.height;
        const ctx = temp.getContext('2d');
        ctx.drawImage(canvas, 0, 0);
        ctx.font = "bold 24px sans-serif"; ctx.fillStyle = "white"; ctx.textAlign = "right";
        ctx.fillText("Slava Lagoykin", temp.width - 30, temp.height - 30);
        const link = document.createElement('a'); link.download = 'Phangan360.png'; link.href = temp.toDataURL(); link.click();
    }

    function handleMapFocus() { if(window.innerWidth < 1024) document.body.className = 'map-full'; setTimeout(() => { map.invalidateSize(); viewer.resize(); }, 400); }
    function handlePanoFocus() { if(window.innerWidth < 1024) document.body.className = 'pano-full'; setTimeout(() => { map.invalidateSize(); viewer.resize(); }, 400); }

    init();
</script>
</body>
</html>
