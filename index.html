<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phangan 360 PRO - URL Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        :root { --accent: #007aff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: #fff; overflow: hidden; }
        
        #main-container { display: flex; height: 100vh; width: 100vw; }
        
        @media (min-width: 1024px) {
            #main-container { flex-direction: row; }
            #map { width: 30% !important; height: 100% !important; border-right: 1px solid #222; }
            #panorama-container { width: 70% !important; height: 100% !important; }
        }
        @media (max-width: 1023px) {
            #main-container { flex-direction: column-reverse; }
            #map { width: 100%; height: 35%; border-top: 1px solid #333; transition: height 0.4s ease; }
            #panorama-container { width: 100%; height: 65%; position: relative; transition: height 0.4s ease; }
            .map-full #map { height: 85%; }
            .map-full #panorama-container { height: 15%; }
            .pano-full #map { height: 10%; }
            .pano-full #panorama-container { height: 90%; }
        }

        #panorama { width: 100%; height: 100%; background: #000; }
        .leaflet-control-attribution { display: none !important; }
        
        /* Кнопки */
        .ui-controls { position: absolute; top: 15px; left: 15px; z-index: 2000; }
        .btn-ui { background: rgba(30,30,30,0.9); color: white; border: 1px solid #444; padding: 12px 18px; border-radius: 12px; font-weight: 600; backdrop-filter: blur(10px); cursor: pointer; }
        
        /* Лоадер */
        #upload-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .palm-container { position: relative; width: 100px; height: 120px; }
        .palm-icon { font-size: 80px; position: relative; z-index: 2; }
        #coconut { position: absolute; top: -50px; left: 35px; font-size: 30px; display: none; }
        
        @keyframes coconutFall { 0% { transform: translateY(0); } 100% { transform: translateY(150px); } }

        /* Админка */
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 16px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body class="pano-full">

<div id="main-container">
    <div id="map" onclick="handleMapClick()"></div>
    <div id="panorama-container" onclick="handlePanoClick()">
        <div id="panorama"></div>
        <div class="ui-controls">
            <button class="btn-ui" onclick="event.stopPropagation(); openAdmin()">+ Добавить</button>
        </div>
    </div>
</div>

<div id="upload-overlay">
    <div class="palm-container">
        <div id="coconut">🥥</div>
        <div class="palm-icon">🌴</div>
    </div>
    <div style="margin-top: 20px; color: #34c759;">Публикация...</div>
</div>

<div id="admin-panel">
    <h2 style="margin-top:0">Новая точка</h2>
    <input type="text" id="in-name" placeholder="Название (напр. Haad Rin)">
    <input type="text" id="in-url" placeholder="ПРЯМАЯ ссылка на фото (из Supabase/ImgBB)">
    <p style="font-size: 11px; color: #888; margin-top: -5px;">* Копируй 'Public URL' из своего облака</p>
    <input type="text" id="in-desc" placeholder="Описание (необязательно)">
    <button class="btn-ui" style="background:var(--accent); border:none; width:100%; padding:20px; font-size: 16px;" onclick="savePoint()">ОПУБЛИКОВАТЬ</button>
    <button class="btn-ui" style="background:none; border:none; width:100%; margin-top:10px; color:#555;" onclick="closeAdmin()">ОТМЕНА</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    let map, viewer, clickCoords = null;
    const SUNSET_IMG = "https://gtbjgvjcmxuwsbkwoxsr.supabase.co/storage/v1/object/sign/360%20-10/sunset%20Thong%20Sala.JPG?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83NWRlMzdkZC03OTI4LTQ1MjEtYjFhNS0xOTUxY2I0N2QxN2IiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiIzNjAgLTEwL3N1bnNldCBUaG9uZyBTYWxhLkpQRyIsImlhdCI6MTc3NzEyOTA3NCwiZXhwIjoxODA4NjY1MDc0fQ.8pY65AdSogP0twllPXJ_30lWR7KcPP9zV6IAqKQz79Q";
    
    let data = JSON.parse(localStorage.getItem('ph_v16') || '[]');

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([9.71, 99.98], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": SUNSET_IMG, "autoLoad": true });

        // Первая точка
        drawMarker({name:'Thong Sala Sunset', coords:{lat:9.7107, lng:99.9813}, img:SUNSET_IMG, id:'main'});
        
        // Твои точки
        data.forEach(p => drawMarker(p));

        map.on('click', e => { clickCoords = e.latlng; });
    }

    function drawMarker(p) {
        const m = L.marker(p.coords, {draggable: true}).addTo(map);
        
        m.on('dragend', function(event) {
            const marker = event.target;
            const position = marker.getLatLng();
            if (p.id !== 'main') {
                const idx = data.findIndex(item => item.id === p.id);
                if (idx > -1) {
                    data[idx].coords = position;
                    localStorage.setItem('ph_v16', JSON.stringify(data));
                }
            }
        });

        m.on('click', (e) => {
            L.DomEvent.stopPropagation(e);
            viewer.destroy();
            viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": p.img, "autoLoad": true });
            if (window.innerWidth < 1024) handlePanoClick();
        });
    }

    function handleMapClick() { if (window.innerWidth < 1024) document.body.className = 'map-full'; setTimeout(() => map.invalidateSize(), 400); }
    function handlePanoClick() { if (window.innerWidth < 1024) document.body.className = 'pano-full'; setTimeout(() => map.invalidateSize(), 400); }
    
    function openAdmin() {
        if(!clickCoords) return alert("Ткни в карту, чтобы выбрать место!");
        document.getElementById('admin-panel').style.display = 'flex';
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function savePoint() {
        const name = document.getElementById('in-name').value;
        const url = document.getElementById('in-url').value;
        if(!name || !url) return alert("Название и ссылка обязательны!");

        document.getElementById('upload-overlay').style.display = 'flex';
        const coco = document.getElementById('coconut');
        coco.style.display = 'block';
        coco.style.animation = 'coconutFall 0.8s forwards';
        
        setTimeout(() => {
            data.push({ id: Date.now(), name, desc: document.getElementById('in-desc').value, coords: clickCoords, img: url });
            localStorage.setItem('ph_v16', JSON.stringify(data));
            location.reload();
        }, 1000);
    }

    init();
</script>
</body>
</html>
